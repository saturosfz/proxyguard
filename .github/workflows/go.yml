name: Go Multi-Binary Cross-Compile

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # 1. 新增 target 维度，对应 Makefile 中的两个独立二进制
        target: [client, server]
        # 2. 操作系统和架构支持
        goos: [linux]
        goarch: [amd64, arm64]
        # 排除 Windows 平台下的 arm64（通常不需要，可根据需求删改）

    steps:
    # 1. 签出代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    # 3. 下载依赖
    - name: Install dependencies
      run: go mod download

    # 4. 参考 Makefile 逻辑进行多产物交叉编译
    - name: Compile Binaries
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0 # 保持纯静态编译
      run: |
        # 动态组装输出文件名，例如: proxyguard-client-linux-amd64
        OUTPUT_NAME="proxyguard-${{ matrix.target }}-${{ matrix.goos }}-${{ matrix.goarch }}"
        
        # Windows 系统追加 .exe 后缀
        if [ "${{ matrix.goos }}" = "windows" ]; then
          OUTPUT_NAME="${OUTPUT_NAME}.exe"
        fi
        
        echo "正在编译: ${OUTPUT_NAME}..."
        
        # 完美对应 Makefile 中的编译路径
        go build -v -ldflags="-s -w" \
          -o build/${OUTPUT_NAME} \
          codeberg.org/eduVPN/proxyguard/cmd/proxyguard-${{ matrix.target }}/...

    # 5. 上传当前矩阵节点的编译产物
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        # 每个 artifact 需要唯一的名称
        name: proxyguard-${{ matrix.target }}-${{ matrix.goos }}-${{ matrix.goarch }}
        path: build/
        retention-days: 5
